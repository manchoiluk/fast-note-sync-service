syntax = "proto3";
package proto.v1;
option go_package = "github.com/haierkeys/fast-note-sync-service/internal/proto/v1;v1";

// WSMessage is the unified envelope structure for WebSocket communication
// WSMessage 是 WebSocket 通信的统一信封结构
message WSMessage {
    string type = 1;      // Message action type (e.g. "NoteSync", "NoteModifyAck") // 消息动作类型
    bytes data = 2;       // Target message payload serialized to bytes // 目标消息的序列化字节流
}

// WSResponse is the unified response envelope (analogous to Res struct)
// WSResponse 是统一的响应信封（与 Res 结构体对应）
message WSResponse {
    int32 code = 1;       // Status code // 状态码
    bool status = 2;      // Is success // 是否成功
    string message = 3;   // Response message // 响应消息
    bytes data = 4;       // Target response payload serialized to bytes // 目标响应载荷的序列化字节流
    string details = 5;   // Error details // 错误细节
    string vault = 6;     // Vault name // 笔记库名称
    string context = 7;   // Context // 上下文
}

// ------------------------------------
// 0. Client Info (ClientInfo)
// ------------------------------------
message ClientInfoMessage {
    string name = 1;
    string version = 2;
    string type = 3;
    bool isDesktop = 4;
    bool isMobile = 5;
    bool isPhone = 6;
    bool isTablet = 7;
    bool isMacOS = 8;
    bool isWin = 9;
    bool isLinux = 10;
    string offlineSyncStrategy = 11;
    bool protobuf = 12;   // Request to upgrade to protobuf // 客户端请求启用 Protobuf
}

message HistoricalVersion {
    string version = 1;
    string changelogContent = 2;
}

message CheckVersionInfo {
    bool githubAvailable = 1;
    bool versionIsNew = 2;
    string versionNewName = 3;
    string versionNewLink = 4;
    string versionNewChangelog = 5;
    string versionNewChangelogContent = 6;
    repeated HistoricalVersion versionHistory = 7;
    bool pluginVersionIsNew = 8;
    string pluginVersionNewName = 9;
    string pluginVersionNewLink = 10;
    string pluginVersionNewChangelog = 11;
    string pluginVersionNewChangelogContent = 12;
    repeated HistoricalVersion pluginVersionHistory = 13;
    int32 syncUpChunkNum = 14;
    int32 syncDownChunkNum = 15;
}

// ------------------------------------
// 1. Note Messages (Note)
// ------------------------------------

message NoteSyncCheckRequest {
    string path = 1;
    string pathHash = 2;
    string contentHash = 3;
    int64 mtime = 4;
    int64 ctime = 5;
}

message NoteSyncDelNote {
    string path = 1;
    string pathHash = 2;
}

message NoteSyncRequest {
    string context = 1;
    string vault = 2;
    int64 lastTime = 3;
    repeated NoteSyncCheckRequest notes = 4;
    repeated NoteSyncDelNote delNotes = 5;
    repeated NoteSyncDelNote missingNotes = 6;
    int32 batchIndex = 7;
    int32 totalBatches = 8;
}

message NoteModifyOrCreateRequest {
    string vault = 1;
    string path = 2;
    string pathHash = 3;
    string baseHash = 4;
    bool baseHashMissing = 5;
    string content = 6;
    string contentHash = 7;
    int64 ctime = 8;
    int64 mtime = 9;
    bool createOnly = 10;
    string context = 11;
}

message NoteUpdateCheckRequest {
    string vault = 1;
    string path = 2;
    string pathHash = 3;
    string contentHash = 4;
    int64 ctime = 5;
    int64 mtime = 6;
}

message NoteDeleteRequest {
    string vault = 1;
    string path = 2;
    string pathHash = 3;
    string context = 4;
}

message NoteRenameRequest {
    string vault = 1;
    string path = 2;
    string pathHash = 3;
    string oldPath = 4;
    string oldPathHash = 5;
    string context = 6;
}

message NoteGetRequest {
    string vault = 1;
    string path = 2;
    string pathHash = 3;
    bool isRecycle = 4;
}

// --- Note Responses ---

message NoteSyncModifyMessage {
    string path = 1;
    string pathHash = 2;
    string content = 3;
    string contentHash = 4;
    int64 ctime = 5;
    int64 mtime = 6;
    int64 lastTime = 7;
}

message NoteSyncDeleteMessage {
    string path = 1;
    string pathHash = 2;
    int64 ctime = 3;
    int64 mtime = 4;
    int64 size = 5;
    int64 lastTime = 6;
}

message NoteSyncRenameMessage {
    string path = 1;
    string pathHash = 2;
    string contentHash = 3;
    int64 ctime = 4;
    int64 mtime = 5;
    int64 size = 6;
    string oldPath = 7;
    string oldPathHash = 8;
    int64 lastTime = 9;
}

message NoteSyncMtimeMessage {
    string path = 1;
    int64 ctime = 2;
    int64 mtime = 3;
    int64 lastTime = 4;
}

message NoteSyncEndMessage {
    int64 lastTime = 1;
    int64 needUploadCount = 2;
    int64 needModifyCount = 3;
    int64 needSyncMtimeCount = 4;
    int64 needDeleteCount = 5;
}

message NoteSyncNeedPushMessage {
    string path = 1;
    string pathHash = 2;
}

message NoteModifyAckMessage {
    int64 lastTime = 1;
    string path = 2;
    string pathHash = 3;
}

message NoteRenameAckMessage {
    int64 lastTime = 1;
    string path = 2;
    string pathHash = 3;
}

message NoteDeleteAckMessage {
    int64 lastTime = 1;
    string path = 2;
    string pathHash = 3;
}

